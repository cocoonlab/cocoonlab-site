<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img">
  <title>Cocoon Lab typography direction</title>
  <rect width="100%" height="100%" fill="#FEFCF8"/>
  <text x="110" y="125" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="600" fill="#1C201B">Typography Direction</text>
  <text x="110" y="240" font-family="Inter Display, Inter, Arial, sans-serif" font-size="140" font-weight="500" letter-spacing="20" fill="#1C201B">COCOON</text>
  <text x="110" y="330" font-family="Inter, Arial, sans-serif" font-size="32" fill="#1C201B" opacity="0.75">Outlined wordmark artwork. Primary fallback recommendation: Inter or a comparable geometric sans.</text>
  <text x="110" y="480" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="600" fill="#1C201B">Clear design signals, early.</text>
  <text x="110" y="575" font-family="Inter, Arial, sans-serif" font-size="36" fill="#1C201B" opacity="0.82">Use quiet hierarchy, wide spacing, and a calm neutral system. Let the architectural imagery carry texture.</text>
  <text x="110" y="720" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#1C201B">Recommended scale</text>
  <text x="110" y="790" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1C201B" opacity="0.75">Headlines: 56-96 px / 1.0 line-height. Body: 18-22 px / 1.45 line-height. Labels: 12-14 px uppercase.</text>
  <text x="110" y="920" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="8" fill="#87977E">SITE  COST  CARBON  CODE  VISUALS</text>
</svg>