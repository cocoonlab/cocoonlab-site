<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technical Dossiers</title>
  <style>
    :root {
      --bg-1: #f5f1ea;
      --bg-2: #ebe4d8;
      --paper: rgba(255, 252, 247, 0.82);
      --paper-strong: rgba(255, 252, 247, 0.92);
      --line: rgba(73, 77, 73, 0.16);
      --line-soft: rgba(73, 77, 73, 0.08);
      --sand: #d8c3a5;
      --sand-soft: #e8dcc9;
      --green: #7f9278;
      --green-soft: #b8c5b2;
      --grey: #9aa1a3;
      --ink: #4e534f;
      --shadow: 0 18px 45px rgba(61, 55, 45, 0.12);
      --shadow-soft: 0 10px 24px rgba(61, 55, 45, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 20%, rgba(216, 195, 165, 0.35), transparent 34%),
        radial-gradient(circle at 78% 72%, rgba(127, 146, 120, 0.18), transparent 28%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .glow {
      position: absolute;
      border-radius: 999px;
      filter: blur(60px);
      opacity: 0.55;
      pointer-events: none;
    }

    .glow.one {
      width: 360px;
      height: 360px;
      left: 6%;
      top: 12%;
      background: rgba(216, 195, 165, 0.35);
    }

    .glow.two {
      width: 300px;
      height: 300px;
      right: 8%;
      bottom: 10%;
      background: rgba(127, 146, 120, 0.18);
    }

    .title-block {
      position: absolute;
      left: 6vw;
      top: 7vh;
      z-index: 3;
      max-width: 420px;
    }

    .eyebrow {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 12px;
      opacity: 0.58;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 70px);
      line-height: 0.95;
      font-weight: 650;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 18px;
      max-width: 28ch;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(78, 83, 79, 0.72);
    }

    .canvas {
      position: absolute;
      inset: 0;
      perspective: 1400px;
    }

    .panel {
      position: absolute;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--paper-strong), var(--paper));
      border: 1px solid rgba(255, 255, 255, 0.56);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.25), transparent 28%),
        linear-gradient(0deg, rgba(255,255,255,0.08), transparent 26%);
      pointer-events: none;
    }

    .panel.soft {
      box-shadow: var(--shadow-soft);
    }

    .p1 {
      width: min(34vw, 480px);
      height: min(43vh, 420px);
      right: 10vw;
      top: 14vh;
      transform: rotate(-5deg) translateZ(40px);
    }

    .p2 {
      width: min(28vw, 390px);
      height: min(36vh, 320px);
      left: 31vw;
      top: 34vh;
      transform: rotate(6deg) translateZ(10px);
    }

    .p3 {
      width: min(23vw, 310px);
      height: min(28vh, 250px);
      right: 22vw;
      bottom: 9vh;
      transform: rotate(2deg);
    }

    .p4 {
      width: min(20vw, 250px);
      height: min(22vh, 210px);
      left: 14vw;
      top: 48vh;
      transform: rotate(-8deg);
    }

    .content {
      position: absolute;
      inset: 18px;
      display: grid;
      gap: 14px;
    }

    .header-line {
      height: 12px;
      width: 44%;
      border-radius: 999px;
      background: rgba(78, 83, 79, 0.10);
    }

    .header-line.small {
      width: 24%;
      height: 8px;
      opacity: 0.72;
    }

    .rule {
      height: 1px;
      background: var(--line-soft);
      width: 100%;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
      min-height: 0;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .module {
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.42);
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .mini-head {
      width: 52%;
      height: 7px;
      border-radius: 999px;
      background: rgba(78, 83, 79, 0.12);
      margin-bottom: 10px;
    }

    .mini-head.tone-sand {
      background: rgba(216, 195, 165, 0.75);
    }

    .mini-head.tone-green {
      background: rgba(127, 146, 120, 0.58);
    }

    .mini-head.tone-grey {
      background: rgba(154, 161, 163, 0.55);
    }

    .metric-row {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .metric {
      display: grid;
      grid-template-columns: 0.75fr 1fr;
      align-items: center;
      gap: 10px;
    }

    .label {
      height: 6px;
      border-radius: 999px;
      background: rgba(78, 83, 79, 0.08);
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(78, 83, 79, 0.08);
      overflow: hidden;
      position: relative;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
    }

    .sand { background: linear-gradient(90deg, var(--sand), var(--sand-soft)); }
    .green { background: linear-gradient(90deg, var(--green), var(--green-soft)); }
    .grey { background: linear-gradient(90deg, var(--grey), #c5cbcd); }

    .donut-wrap {
      display: grid;
      place-items: center;
      height: 100%;
    }

    .donut {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background:
        conic-gradient(
          var(--green) 0 36%,
          var(--sand) 36% 68%,
          var(--grey) 68% 86%,
          rgba(78, 83, 79, 0.08) 86% 100%
        );
      position: relative;
      opacity: 0.95;
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: rgba(255, 252, 247, 0.92);
      box-shadow: inset 0 0 0 1px var(--line-soft);
    }

    .chart {
      height: 130px;
      position: relative;
      border-radius: 14px;
      background:
        linear-gradient(to top, rgba(78,83,79,0.04) 1px, transparent 1px) 0 0 / 100% 28px,
        linear-gradient(to right, rgba(78,83,79,0.04) 1px, transparent 1px) 0 0 / 52px 100%;
      overflow: hidden;
    }

    .chart svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .blocks {
      display: grid;
      gap: 8px;
    }

    .block {
      height: 14px;
      border-radius: 999px;
      background: rgba(78, 83, 79, 0.08);
    }

    .block.short { width: 48%; }
    .block.mid { width: 72%; }
    .block.long { width: 100%; }

    .elevation {
      height: 120px;
      border-radius: 16px;
      border: 1px solid var(--line-soft);
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.46), rgba(255,255,255,0.14));
    }

    .elevation .base {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 26px;
      height: 2px;
      background: rgba(78, 83, 79, 0.16);
    }

    .elevation .shape {
      position: absolute;
      bottom: 28px;
      border: 1.5px solid rgba(78, 83, 79, 0.20);
      background: rgba(255, 255, 255, 0.24);
    }

    .elevation .s1 {
      left: 16%;
      width: 18%;
      height: 46px;
      border-radius: 8px 8px 2px 2px;
    }

    .elevation .s2 {
      left: 34%;
      width: 22%;
      height: 74px;
      border-radius: 8px 8px 2px 2px;
    }

    .elevation .s3 {
      left: 56%;
      width: 15%;
      height: 56px;
      border-radius: 8px 8px 2px 2px;
    }

    .elevation .s4 {
      left: 71%;
      width: 10%;
      height: 32px;
      border-radius: 8px 8px 2px 2px;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .foot {
      position: absolute;
      left: 6vw;
      bottom: 5vh;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(78, 83, 79, 0.45);
    }

    .fine-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(78,83,79,0.025) 1px, transparent 1px) 0 0 / 64px 64px,
        linear-gradient(to bottom, rgba(78,83,79,0.025) 1px, transparent 1px) 0 0 / 64px 64px;
      mask-image: radial-gradient(circle at center, black 46%, transparent 95%);
      pointer-events: none;
      z-index: 0;
    }

    @media (max-width: 980px) {
      .title-block {
        position: relative;
        left: auto;
        top: auto;
        padding: 32px 24px 0;
        max-width: none;
      }

      .foot {
        left: 24px;
        bottom: 18px;
      }

      .canvas {
        position: relative;
        height: calc(100% - 180px);
        min-height: 680px;
      }

      .p1 {
        width: 58vw;
        height: 320px;
        right: 5vw;
        top: 40px;
      }

      .p2 {
        width: 46vw;
        height: 270px;
        left: 12vw;
        top: 270px;
      }

      .p3 {
        width: 42vw;
        height: 210px;
        right: 10vw;
        bottom: 80px;
      }

      .p4 {
        width: 34vw;
        height: 180px;
        left: 8vw;
        top: 470px;
      }
    }

    @media (max-width: 700px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 1100px;
      }

      .canvas {
        min-height: 860px;
      }

      .p1, .p2, .p3, .p4 {
        transform: none;
      }

      .p1 {
        width: calc(100% - 32px);
        left: 16px;
        right: 16px;
        top: 30px;
        height: 310px;
      }

      .p2 {
        width: calc(100% - 60px);
        left: 30px;
        top: 370px;
        height: 260px;
      }

      .p3 {
        width: calc(100% - 44px);
        left: 22px;
        right: 22px;
        top: 660px;
        bottom: auto;
        height: 210px;
      }

      .p4 {
        width: calc(100% - 110px);
        left: 55px;
        top: 900px;
        height: 170px;
      }

      .foot {
        position: static;
        padding: 18px 24px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="fine-grid"></div>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <div class="title-block">
      <div class="eyebrow">Automated Reports</div>
      <h1>Technical<br>Dossiers</h1>
      <div class="subtitle">
        Feasibility, cost, and sustainability summaries presented as a calm,
        structured architectural composition.
      </div>
    </div>

    <div class="canvas">
      <div class="panel p1">
        <div class="content">
          <div class="header-line"></div>
          <div class="header-line small"></div>
          <div class="rule"></div>

          <div class="grid-2">
            <div class="module">
              <div class="mini-head tone-green"></div>
              <div class="chart">
                <svg viewBox="0 0 400 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M14 98 C58 92, 72 52, 112 62 S174 112, 220 86 S286 32, 332 46 S372 80, 392 34"
                        stroke="#7f9278" stroke-width="3" stroke-linecap="round"/>
                  <path d="M14 108 C54 98, 86 86, 126 92 S188 70, 232 76 S300 104, 392 68"
                        stroke="#d8c3a5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
                  <circle cx="112" cy="62" r="4" fill="#7f9278"/>
                  <circle cx="220" cy="86" r="4" fill="#7f9278"/>
                  <circle cx="332" cy="46" r="4" fill="#7f9278"/>
                </svg>
              </div>
            </div>

            <div class="module">
              <div class="mini-head tone-sand"></div>
              <div class="donut-wrap">
                <div class="donut"></div>
              </div>
            </div>
          </div>

          <div class="grid-3">
            <div class="module">
              <div class="mini-head tone-grey"></div>
              <div class="metric-row">
                <div class="metric">
                  <div class="label"></div>
                  <div class="bar"><span class="green" style="width: 76%"></span></div>
                </div>
                <div class="metric">
                  <div class="label"></div>
                  <div class="bar"><span class="sand" style="width: 62%"></span></div>
                </div>
                <div class="metric">
                  <div class="label"></div>
                  <div class="bar"><span class="grey" style="width: 48%"></span></div>
                </div>
              </div>
            </div>

            <div class="module">
              <div class="mini-head tone-green"></div>
              <div class="blocks">
                <div class="block long"></div>
                <div class="block mid"></div>
                <div class="block long"></div>
                <div class="block short"></div>
              </div>
            </div>

            <div class="module">
              <div class="mini-head tone-sand"></div>
              <div class="blocks">
                <div class="dots" style="margin-top: 10px;">
                  <div class="dot sand"></div>
                  <div class="block mid" style="height: 8px;"></div>
                </div>
                <div class="dots">
                  <div class="dot green"></div>
                  <div class="block short" style="height: 8px;"></div>
                </div>
                <div class="dots">
                  <div class="dot grey"></div>
                  <div class="block long" style="height: 8px;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel p2 soft">
        <div class="content">
          <div class="header-line" style="width: 52%;"></div>
          <div class="header-line small" style="width: 30%;"></div>
          <div class="elevation">
            <div class="shape s1"></div>
            <div class="shape s2"></div>
            <div class="shape s3"></div>
            <div class="shape s4"></div>
            <div class="base"></div>
          </div>
          <div class="grid-2" style="grid-template-columns: 1fr 1fr;">
            <div class="module">
              <div class="mini-head tone-green"></div>
              <div class="metric-row">
                <div class="metric">
                  <div class="label"></div>
                  <div class="bar"><span class="green" style="width: 84%"></span></div>
                </div>
                <div class="metric">
                  <div class="label"></div>
                  <div class="bar"><span class="sand" style="width: 54%"></span></div>
                </div>
              </div>
            </div>
            <div class="module">
              <div class="mini-head tone-grey"></div>
              <div class="blocks">
                <div class="block mid"></div>
                <div class="block long"></div>
                <div class="block short"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel p3 soft">
        <div class="content">
          <div class="header-line" style="width: 58%;"></div>
          <div class="rule"></div>
          <div class="module" style="height: 100%;">
            <div class="mini-head tone-sand"></div>
            <div class="chart" style="height: 140px;">
              <svg viewBox="0 0 360 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="38" y="68" width="32" height="52" rx="10" fill="#d8c3a5" opacity="0.85"/>
                <rect x="88" y="48" width="32" height="72" rx="10" fill="#7f9278" opacity="0.88"/>
                <rect x="138" y="80" width="32" height="40" rx="10" fill="#9aa1a3" opacity="0.82"/>
                <rect x="188" y="34" width="32" height="86" rx="10" fill="#d8c3a5" opacity="0.92"/>
                <rect x="238" y="58" width="32" height="62" rx="10" fill="#7f9278" opacity="0.78"/>
                <rect x="288" y="22" width="32" height="98" rx="10" fill="#9aa1a3" opacity="0.72"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div class="panel p4 soft">
        <div class="content">
          <div class="header-line" style="width: 66%;"></div>
          <div class="module" style="height: 100%;">
            <div class="mini-head tone-green"></div>
            <div class="blocks">
              <div class="block long"></div>
              <div class="block long"></div>
              <div class="block mid"></div>
              <div class="block short"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">Feasibility • Cost • Sustainability</div>
  </div>
</body>
</html>
